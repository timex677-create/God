<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church Bible Review</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyB_s-sIVQDCpmnSuqvVIVWRmy_cta8myoM",
  authDomain: "church-bible-review.firebaseapp.com",
  projectId: "church-bible-review",
  storageBucket: "church-bible-review.firebasestorage.app",
  messagingSenderId: "53543883622",
  appId: "1:53543883622:web:95cb620a9bd60c0abb2ea7"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Elements
const nameInput = document.getElementById("name");
const booksContainer = document.getElementById("booksContainer");
const chaptersContainer = document.getElementById("chaptersContainer");
const reviewInput = document.getElementById("review");
const submitBtn = document.getElementById("submit");
const adminBtn = document.getElementById("adminBtn");
const adminPanel = document.getElementById("adminPanel");
const closeAdminBtn = document.getElementById("closeAdmin");
const submissionsDiv = document.getElementById("submissions");

let selectedBook = "";
let selectedChapter = "";

// Bible books
const bibleBooks = {
  "Genesis": 50, "Exodus": 40, "Leviticus": 27, "Numbers": 36, "Deuteronomy": 34,
  "Joshua": 24, "Judges": 21, "Ruth": 4, "1 Samuel": 31, "2 Samuel": 24,
  "1 Kings": 22, "2 Kings": 25, "1 Chronicles": 29, "2 Chronicles": 36,
  "Ezra": 10, "Nehemiah": 13, "Esther": 10, "Job": 42, "Psalms": 150,
  "Proverbs": 31, "Ecclesiastes": 12, "Song of Solomon": 8, "Isaiah": 66,
  "Jeremiah": 52, "Lamentations": 5, "Ezekiel": 48, "Daniel": 12,
  "Hosea": 14, "Joel": 3, "Amos": 9, "Obadiah": 1, "Jonah": 4,
  "Micah": 7, "Nahum": 3, "Habakkuk": 3, "Zephaniah": 3,
  "Haggai": 2, "Zechariah": 14, "Malachi": 4, "Matthew": 28,
  "Mark": 16, "Luke": 24, "John": 21, "Acts": 28,
  "Romans": 16, "1 Corinthians": 16, "2 Corinthians": 13, "Galatians": 6,
  "Ephesians": 6, "Philippians": 4, "Colossians": 4, "1 Thessalonians": 5,
  "2 Thessalonians": 3, "1 Timothy": 6, "2 Timothy": 4, "Titus": 3,
  "Philemon": 1, "Hebrews": 13, "James": 5, "1 Peter": 5, "2 Peter": 3,
  "1 John": 5, "2 John": 1, "3 John": 1, "Jude": 1, "Revelation": 22
};

// Create book cards
for (let book in bibleBooks) {
  const card = document.createElement("div");
  card.className = "bookCard";
  card.textContent = book;
  card.addEventListener("click", () => {
    selectedBook = book;
    createChapterCards(bibleBooks[book]);
  });
  booksContainer.appendChild(card);
}

// Create chapter cards
function createChapterCards(numChapters) {
  chaptersContainer.innerHTML = "";
  for (let i = 1; i <= numChapters; i++) {
    const card = document.createElement("div");
    card.className = "chapterCard";
    card.textContent = i;
    card.addEventListener("click", () => {
      selectedChapter = i;
      document.querySelectorAll(".chapterCard").forEach(c => c.classList.remove("selectedChapter"));
      card.classList.add("selectedChapter");
    });
    chaptersContainer.appendChild(card);
  }
}

// Submit review
submitBtn.addEventListener("click", async () => {
  if (!nameInput.value || !selectedBook || !selectedChapter || !reviewInput.value) {
    alert("Please complete all fields!");
    return;
  }
  await addDoc(collection(db, "reviews"), {
    name: nameInput.value,
    book: selectedBook,
    chapter: selectedChapter,
    review: reviewInput.value,
    date: new Date()
  });
  alert("Submitted!");
  nameInput.value = "";
  reviewInput.value = "";
  chaptersContainer.innerHTML = "";
});

// Admin panel animation
adminBtn.addEventListener("click", async () => {
  adminPanel.style.display = "block";
  adminPanel.classList.add("slideIn");
  adminPanel.classList.remove("slideOut");
  submissionsDiv.innerHTML = "Loading...";
  const querySnapshot = await getDocs(collection(db, "reviews"));
  submissionsDiv.innerHTML = "";
  querySnapshot.forEach((doc) => {
    const r = doc.data();
    submissionsDiv.innerHTML += `<p><b>${r.name}</b> (${r.book} ${r.chapter}): ${r.review}</p>`;
  });
});
closeAdminBtn.addEventListener("click", () => {
  adminPanel.classList.add("slideOut");
  adminPanel.classList.remove("slideIn");
  setTimeout(() => { adminPanel.style.display = "none"; }, 300); // wait for animation
});
</script>

<style>
body { font-family: 'Segoe UI', sans-serif; margin:0; padding:20px; background: linear-gradient(135deg,#d7a1f9,#a37eea); color:#fff; }
h1 { text-align:center; margin-bottom:20px; text-shadow:2px2px5px #00000050; }

#booksContainer, #chaptersContainer { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
.bookCard, .chapterCard {
  padding:12px 18px;
  border-radius:16px;
  cursor:pointer;
  background: linear-gradient(135deg,#c299f9,#7e5af1);
  color:#fff;
  font-weight:bold;
  text-align:center;
  box-shadow:2px2px10px rgba(0,0,0,0.3);
  transition: transform 0.2s, box-shadow 0.3s, background 0.3s;
}
.bookCard:hover, .chapterCard:hover { transform: scale(1.08); box-shadow:3px3px15px rgba(0,0,0,0.4); background: linear-gradient(135deg,#9d50bb,#6e48aa);}
.selectedChapter { background: linear-gradient(135deg,#7e3aa5,#5e2d87); }

input, textarea { width:100%; padding:12px; border-radius:12px; border:none; margin-bottom:10px; outline:none; color:#333; }
textarea { resize:none; }

button {
  padding:14px 24px; border:none; border-radius:16px;
  background: linear-gradient(90deg,#9b59b6,#8e44ad);
  color:#fff; font-weight:bold; cursor:pointer;
  box-shadow: 2px2px12px rgba(0,0,0,0.3); transition: transform 0.2s;
}
button:hover { transform: scale(1.05); }

#adminBtn {
  position:fixed; top:15px; right:15px; background:#6a11cb; border-radius:50%; width:50px; height:50px; font-size:24px; color:#fff;
}
#adminPanel {
  display:none; position:fixed; top:10px; right:10px; background:#ffffffdd; color:#333; border-radius:16px; padding:20px;
  max-height:80vh; width:350px; overflow-y:auto; box-shadow:3px3px20px rgba(0,0,0,0.3);
  transform: translateX(100%);
}
#closeAdmin { margin-top:10px; background: linear-gradient(90deg,#8e44ad,#6a1b9a); color:#fff; width:100%; padding:12px; border:none; border-radius:12px; cursor:pointer;}
#submissions p { background:#d7bde2; padding:10px; border-radius:10px; margin-bottom:6px; color:#000; }

/* Slide animations */
.slideIn { animation: slideIn 0.3s forwards; }
.slideOut { animation: slideOut 0.3s forwards; }
@keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
@keyframes slideOut { from { transform: translateX(0); } to { transform: translateX(100%); } }
</style>
</head>

<body>
<h1>Church Bible Review</h1>

<input type="text" id="name" placeholder="Your Name">

<h3>Choose Book:</h3>
<div id="booksContainer"></div>

<h3>Choose Chapter:</h3>
<div id="chaptersContainer"></div>

<textarea id="review" rows="5" placeholder="Write your review here..."></textarea>
<button id="submit">Submit Review</button>

<button id="adminBtn">☰</button>
<div id="adminPanel">
  <h3>Submissions</h3>
  <div id="submissions"></div>
  <button id="closeAdmin">Close</button>
</div>
</body>
</html>
